<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeevelo Apply</title>
<meta name="description" content="Zeevelo Apply — match, tailor, and auto-apply with receipts.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF7EF;--ink:#171511;--ink-soft:#4c473d;--line:#d9d3c4;
    --zee:#D8F337;--zee-deep:#22492f;--card:#fff;--red:#b3392f;--amber:#a06a12;
    --mono:'IBM Plex Mono',monospace;--sans:'Space Grotesk',sans-serif;--serif:'Fraunces',serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .mono{font-family:var(--mono)}
  .layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}

  /* sidebar */
  aside{border-right:1px solid var(--line);padding:20px 16px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
  .logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:1.1rem;text-decoration:none;margin-bottom:22px;letter-spacing:-.02em}
  .logo-mark{width:26px;height:26px;background:var(--ink);color:var(--zee);display:grid;place-items:center;font-family:var(--serif);font-weight:700;border-radius:6px;font-size:.95rem}
  .navbtn{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 12px;border-radius:9px;border:none;background:none;font-family:var(--sans);font-size:.92rem;color:var(--ink-soft);cursor:pointer;text-align:left;width:100%}
  .navbtn:hover{background:#f0ecdf}
  .navbtn.active{background:var(--ink);color:var(--zee)}
  .navbtn .count{font-family:var(--mono);font-size:.7rem;background:var(--paper);color:var(--ink-soft);border:1px solid var(--line);border-radius:999px;padding:1px 8px}
  .navbtn.active .count{background:var(--zee);color:var(--ink);border-color:var(--zee)}
  .admin-card{margin-top:auto;border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--card);font-size:.8rem}
  .admin-card b{display:block}
  .badge-admin{display:inline-block;background:var(--zee);font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;padding:2px 8px;border-radius:999px;margin-top:6px}
  .quota{font-family:var(--mono);font-size:.68rem;color:var(--zee-deep);margin-top:6px}

  main{padding:30px 36px;max-width:1060px}
  h1{font-family:var(--serif);font-weight:600;font-size:1.9rem;letter-spacing:-.01em}
  .sub{color:var(--ink-soft);margin:6px 0 24px;font-size:.95rem}
  h2{font-family:var(--serif);font-weight:600;font-size:1.25rem;margin:26px 0 12px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .btn{display:inline-block;border:none;cursor:pointer;text-decoration:none;font-family:var(--sans);font-weight:600;border-radius:999px;padding:10px 20px;font-size:.9rem;background:var(--ink);color:var(--zee)}
  .btn:hover{opacity:.92}
  .btn-ghost{background:none;border:1.5px solid var(--ink);color:var(--ink)}
  .btn-sm{padding:6px 14px;font-size:.8rem}
  .btn-lime{background:var(--zee);color:var(--ink)}
  .btn[disabled]{opacity:.4;cursor:not-allowed}
  textarea,input[type=text],input[type=url],input[type=number]{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-family:var(--mono);font-size:.82rem;background:var(--paper);color:var(--ink)}
  textarea:focus,input:focus{outline:2px solid var(--zee)}
  label{font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);display:block;margin:14px 0 6px}

  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-family:var(--mono);font-size:.72rem;padding:4px 11px;border-radius:999px;border:1px solid var(--line);background:var(--paper)}
  .chip.hit{background:var(--zee);border-color:var(--zee)}
  .chip.miss{color:var(--red);border-style:dashed;border-color:var(--red)}

  .score-pill{font-family:var(--mono);font-weight:500;border-radius:8px;padding:4px 10px;font-size:.85rem;display:inline-block}
  .s-hi{background:var(--zee);color:var(--ink)}
  .s-mid{background:#f3e2b3;color:var(--amber)}
  .s-lo{background:#f5d9d6;color:var(--red)}

  .job-row{display:grid;grid-template-columns:56px 1fr auto;gap:16px;align-items:center;padding:16px 0;border-bottom:1px solid var(--line)}
  .job-row:last-child{border-bottom:none}
  .job-row h3{font-size:1rem}
  .job-row .meta{font-family:var(--mono);font-size:.72rem;color:var(--ink-soft)}
  .status{font-family:var(--mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:999px;border:1px solid var(--line)}
  .st-Matched{background:#eee9db}
  .st-Tailored{background:#f3e2b3}
  .st-Ready{background:var(--zee)}
  .st-Submitted{background:var(--ink);color:var(--zee)}
  .st-Reply{background:var(--zee-deep);color:#fff}

  .pipeline{display:flex;gap:8px;margin:18px 0 22px;flex-wrap:wrap}
  .stage{flex:1;min-width:110px;border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--card);text-align:center}
  .stage b{font-family:var(--serif);font-size:1.6rem;display:block}
  .stage span{font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}

  /* diff */
  .diff{display:grid;grid-template-columns:1fr 1fr;gap:14px;font-family:var(--mono);font-size:.74rem;line-height:1.7}
  .diff>div{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:14px;white-space:pre-wrap;max-height:380px;overflow:auto}
  .diff .add{background:var(--zee);border-radius:3px;padding:0 2px}
  .diff .del{background:#f5d9d6;text-decoration:line-through;border-radius:3px;padding:0 2px}
  .diff-head{font-family:var(--mono);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}

  /* receipts */
  .receipt{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:18px 20px 14px;font-family:var(--mono);font-size:.76rem;margin-bottom:14px;position:relative}
  .receipt::after{content:"";position:absolute;left:0;right:0;bottom:-7px;height:8px;background:radial-gradient(circle at 8px 0, transparent 6px, var(--card) 6.5px);background-size:16px 8px}
  .r-row{display:flex;justify-content:space-between;padding:3px 0;color:var(--ink-soft);gap:16px}
  .r-row b{color:var(--ink);font-weight:500;text-align:right}
  .r-head{display:flex;justify-content:space-between;border-bottom:1px dashed var(--line);padding-bottom:8px;margin-bottom:8px;letter-spacing:.1em}
  .r-mode{font-size:.62rem;padding:2px 8px;border-radius:999px;background:var(--zee)}
  .r-mode.auto{background:var(--ink);color:var(--zee)}

  /* rules */
  .rule-row{display:flex;align-items:center;gap:14px;margin:14px 0}
  input[type=range]{flex:1;accent-color:var(--zee-deep)}
  .thresh{font-family:var(--serif);font-size:1.6rem;min-width:56px;text-align:center;background:var(--zee);border-radius:9px;padding:2px 8px}
  .mode-opt{display:flex;gap:12px;align-items:flex-start;border:1.5px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;margin-bottom:10px}
  .mode-opt.sel{border-color:var(--ink);background:var(--card)}
  .mode-opt input{margin-top:4px;accent-color:var(--zee-deep)}
  .mode-opt b{display:block;font-size:.95rem}
  .mode-opt p{font-size:.82rem;color:var(--ink-soft)}

  .empty{border:1.5px dashed var(--line);border-radius:14px;padding:36px;text-align:center;color:var(--ink-soft);font-size:.9rem}
  .toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:var(--zee);font-family:var(--mono);font-size:.78rem;padding:12px 18px;border-radius:10px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:99;max-width:340px}
  .toast.show{opacity:1}
  .bar{height:7px;background:#eee9db;border-radius:99px;overflow:hidden;margin-top:6px}
  .bar>i{display:block;height:100%;background:var(--zee-deep)}
  .flex{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .right{margin-left:auto}
  .muted{color:var(--ink-soft);font-size:.85rem}
  .view{display:none}.view.on{display:block}
  @media(max-width:860px){.layout{grid-template-columns:1fr}aside{position:static;height:auto;flex-direction:row;flex-wrap:wrap}.grid2,.diff{grid-template-columns:1fr}main{padding:20px}}
</style>
</head>
<body>
<div class="layout">
  <aside>
    <a class="logo" href="https://jobs.zeevelo.com"><span class="logo-mark">Z</span>zeevelo<span class="mono" style="font-size:.6rem;letter-spacing:.14em;color:var(--zee-deep);margin-left:2px">APPLY</span></a>
    <button class="navbtn active" data-view="dashboard">Dashboard</button>
    <button class="navbtn" data-view="profile">Profile</button>
    <button class="navbtn" data-view="jobs">Jobs <span class="count" id="c-jobs">0</span></button>
    <button class="navbtn" data-view="queue">Queue <span class="count" id="c-queue">0</span></button>
    <button class="navbtn" data-view="receipts">Receipts <span class="count" id="c-receipts">0</span></button>
    <button class="navbtn" data-view="settings">Rules &amp; Settings</button>
    <div class="admin-card" id="userCard"></div>
  </aside>
  <main id="main"></main>
</div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
